{% extends "base.html" %}

{% block title %}Registro de usuario{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="card auth-card">
        <div class="card-header">
            <h1>Crear cuenta</h1>
            <p>Registra un nuevo usuario para ingresar al sistema.</p>
        </div>

        <form method="post" class="auth-form">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Nuevo usuario" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required>

            <label for="confirmar_contrasena">Confirmar contraseña</label>
            <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" placeholder="Confirma la contraseña" required>

            <button type="submit" class="btn btn-primary">Registrarme</button>
        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </p>
    </div>
</section>
{% endblock %}
